<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Access - Central Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color) 60%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .subtitle strong {
            color: var(--text-color);
        }

        .scope-list {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .scope-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .scope-item:last-child {
            margin-bottom: 0;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .scope-label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
        }

        .scope-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn-group {
            display: flex;
            gap: 16px;
        }

        .btn {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-approve {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-approve:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/auth-pages.css}">
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">Authorize Client</div>
            <div class="subtitle">
                The application <strong th:text="${clientId}">Client</strong> wants to access your Expense Tracker account.
            </div>
        </div>

        <form name="consent_form" method="post" th:action="@{/oauth2/authorize}">
            <input type="hidden" name="client_id" th:value="${clientId}">
            <input type="hidden" name="state" th:value="${state}">

            <div class="scope-list">
                <div th:each="scope: ${scopes}" class="scope-item">
                    <div class="checkbox-container">
                        <input type="checkbox" name="scope" th:value="${scope.scope}" th:id="${scope.scope}" checked style="accent-color: var(--primary); width: 100%; height: 100%; cursor: pointer;">
                    </div>
                    <div>
                        <label class="scope-label" th:for="${scope.scope}" th:text="${scope.scope}">Scope Name</label>
                        <div class="scope-description" th:text="${scope.description}">Access description details.</div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" name="consent" value="approve" class="btn btn-approve">Approve Access</button>
                <button type="submit" name="consent" value="cancel" class="btn btn-cancel">Cancel</button>
            </div>
        </form>

        <div class="footer">
            Only authorize applications you trust with your financial data.
        </div>
    </div>
</body>
</html>
