spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Disable Flyway in local dev to let JPA auto-generate/verify database schemas
  flyway:
    enabled: false

  # Mail mock properties for local logger fallback
  mail:
    host: localhost

# Application-level auth configurations
app:
  auth:
    verification-base-url: http://localhost:9000/verify-email

# Expose actuator observation endpoints in development
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: expense-tracker-auth
