spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:expense_tracker_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Enable Flyway migrations for production database consistency
  flyway:
    enabled: true
    baseline-on-migrate: true

  # SMTP server configurations
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

app:
  auth:
    issuer-uri: ${AUTH_ISSUER_URI:http://localhost:9000}
    verification-base-url: ${VERIFICATION_BASE_URL:http://localhost:9000/verify-email}
    jwk-set-location: ${JWK_SET_LOCATION:}
    client:
      enabled: ${AUTH_CLIENT_ENABLED:false}
      client-id: ${AUTH_CLIENT_ID:expense-tracker-web}
      client-secret: ${AUTH_CLIENT_SECRET:change-me-client-secret}
      public-client: ${AUTH_CLIENT_PUBLIC_CLIENT:true}
      redirect-uris: ${AUTH_CLIENT_REDIRECT_URIS:http://localhost:5173/auth/callback}
      post-logout-redirect-uris: ${AUTH_CLIENT_POST_LOGOUT_REDIRECT_URIS:http://localhost:5173}
      scopes: ${AUTH_CLIENT_SCOPES:openid,profile}

  cors:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS}
  security:
    verification-token-expiration-hours: ${VERIFICATION_TOKEN_EXPIRATION_HOURS:24}
    account-lockout:
      enabled: true
      max-attempts: ${ACCOUNT_LOCKOUT_MAX_ATTEMPTS:5}
      duration-minutes: ${ACCOUNT_LOCKOUT_DURATION_MINUTES:15}
    rate-limiting:
      enabled: true
      requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:100}
    cors:
      require-explicit-origins: true
    token-blacklist:
      enabled: true

logging:
  level:
    root: WARN
    com.example.auth: INFO
  file:
    name: logs/application.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
