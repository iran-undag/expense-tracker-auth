<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Central Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color) 60%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: var(--text-color);
            transition: all 0.2s ease;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .input-error {
            border-color: var(--danger) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }

        .error-text {
            color: #fca5a5;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .password-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #ffffff;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" th:href="@{/css/auth-pages.css}">
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">Expense Tracker</div>
            <div class="subtitle">Create your central security account</div>
        </div>

        <!-- Alert general errors -->
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Error Message</div>

        <!-- Sign up form -->
        <form th:action="@{/signup}" th:object="${signupRequest}" method="POST">
            
            <div class="form-group">
                <label class="form-label" for="displayName">Display Name</label>
                <input class="form-input" th:classappend="${#fields.hasErrors('displayName')} ? 'input-error'" type="text" id="displayName" th:field="*{displayName}" required placeholder="John Doe">
                <div class="error-text" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}">Display Name Error</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-input" th:classappend="${#fields.hasErrors('email')} ? 'input-error'" type="email" id="email" th:field="*{email}" required placeholder="name@example.com">
                <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" th:classappend="${#fields.hasErrors('password')} ? 'input-error'" type="password" id="password" th:field="*{password}" required placeholder="••••••••">
                <div class="password-info">
                    Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, and one digit.
                </div>
                <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password Error</div>
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="footer-links">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
