spring:
  application:
    name: expense-tracker-auth

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:github-dummy-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:github-dummy-client-secret}
            scope: read:user,user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-dummy-client-secret}
            scope: openid,profile,email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:facebook-dummy-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:facebook-dummy-client-secret}
            scope: email,public_profile
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      repositories:
        enabled: false

server:
  port: 9000

app:
  admin:
    bootstrap:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${ADMIN_BOOTSTRAP_EMAIL:}
      password: ${ADMIN_BOOTSTRAP_PASSWORD:}
      display-name: ${ADMIN_BOOTSTRAP_DISPLAY_NAME:Administrator}
      reset-password: ${ADMIN_BOOTSTRAP_RESET_PASSWORD:false}
  security:
    verification-token-expiration-hours: ${VERIFICATION_TOKEN_EXPIRATION_HOURS:24}
    account-lockout:
      enabled: true
      max-attempts: ${ACCOUNT_LOCKOUT_MAX_ATTEMPTS:5}
      duration-minutes: ${ACCOUNT_LOCKOUT_DURATION_MINUTES:15}
    rate-limiting:
      enabled: true
      requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:100}
    cors:
      require-explicit-origins: false
    token-blacklist:
      enabled: true

# Endpoint documentation details
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
