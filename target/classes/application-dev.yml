spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Disable Flyway in local dev to let JPA auto-generate/verify database schemas
  flyway:
    enabled: false

  sql:
    init:
      mode: always
      schema-locations:
        - classpath:org/springframework/security/oauth2/server/authorization/client/oauth2-registered-client-schema.sql
        - classpath:org/springframework/security/oauth2/server/authorization/oauth2-authorization-schema.sql
        - classpath:org/springframework/security/oauth2/server/authorization/oauth2-authorization-consent-schema.sql

  # Mail mock properties for local logger fallback
  mail:
    host: localhost

# Application-level auth configurations
app:
  auth:
    verification-base-url: http://localhost:9000/verify-email
    client:
      enabled: true
      client-id: expense-tracker-web
      public-client: true
      redirect-uris: https://oauth.pstmn.io/v1/callback,https://oauth.pstmn.io/v1/browser-callback,http://localhost:5173/auth/callback
      post-logout-redirect-uris: http://localhost:5173
      scopes: openid,profile
  cors:
    allowed-origin-patterns: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,http://localhost:9000,http://127.0.0.1:9000
  security:
    verification-token-expiration-hours: 720
    account-lockout:
      enabled: false
    rate-limiting:
      enabled: false
    cors:
      require-explicit-origins: false
    token-blacklist:
      enabled: false

# Expose actuator observation endpoints in development
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: expense-tracker-auth
